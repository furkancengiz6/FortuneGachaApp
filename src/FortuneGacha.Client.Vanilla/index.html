<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortuneGacha | Günlük Falın ve AI Görselin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0a0a0c; color: #e2e2e2; overflow-x: hidden; }
        .bg-mystic { background: radial-gradient(circle at top left, #1a1a2e 0%, #0a0a0c 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gacha-ball { transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 0 30px rgba(124, 58, 237, 0.4)); }
        .gacha-ball:hover { transform: scale(1.05) rotate(5deg); }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
        .gold-glow { box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .shine { position: relative; overflow: hidden; }
        .shine::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }

        /* Rarity Borders */
        .rarity-Common { border: 2px solid rgba(255,255,255,0.1); }
        .rarity-Rare { border: 2px solid #7c3aed; box-shadow: 0 0 15px rgba(124, 58, 237, 0.3); }
        .rarity-Legendary { border: 2px solid #fbbf24; box-shadow: 0 0 25px rgba(251, 191, 36, 0.5); position: relative; }
        .rarity-Legendary::before { content: ''; position: absolute; inset: -4px; border: 2px solid #fbbf24; border-radius: inherit; opacity: 0.3; animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.05); opacity: 0.1; } }

        /* Progress Animation */
        .loader-ring { width: 120px; height: 120px; border-radius: 50%; position: relative; border: 4px solid rgba(255,255,255,0.1); border-top-color: #7c3aed; animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-mystic min-h-screen">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center bg-opacity-30">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
            <div class="w-8 h-8 bg-gradient-to-tr from-purple-600 to-amber-400 rounded-full gold-glow"></div>
            <span class="text-xl font-bold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">FORTUNE GACHA</span>
        </div>
        <div id="auth-nav" class="flex gap-4">
            <button id="nav-login" class="text-sm text-gray-400 hover:text-white transition">Giriş Yap</button>
            <button id="nav-register" class="text-sm px-4 py-1.5 rounded-full bg-purple-600 text-white font-semibold hover:bg-purple-700 transition">Kayıt Ol</button>
        </div>
        <div id="user-nav" class="hidden flex gap-6 items-center">
            <div class="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                <span class="text-xs text-amber-500 font-bold">GP:</span>
                <span id="user-gp" class="text-sm font-bold">100</span>
            </div>
            <button id="social-toggle" class="text-gray-400 hover:text-purple-400 transition" aria-label="Sosyal Paneli Aç">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </button>
            <span id="current-username" class="text-sm text-amber-400 font-medium"></span>
            <button id="logout-btn" class="text-sm text-gray-500 hover:text-white">Çıkış</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-5xl">
        <!-- Hero / Draw Section -->
        <section id="draw-panel" class="flex flex-col items-center justify-center py-20 text-center">
            <div class="mb-8">
                <h1 class="text-5xl md:text-7xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">Kaderini Keşfet</h1>
                <p class="text-gray-400 text-lg max-w-md mx-auto">Yapay zeka ile dokunan günlük kehanetin hazır.</p>
            </div>

            <!-- Gacha Visual -->
            <div id="gacha-container" class="relative cursor-pointer group mb-12">
                <div class="absolute inset-0 bg-purple-600/20 blur-[100px] rounded-full"></div>
                <img id="gacha-orb" src="https://api.iconify.design/solar:magic-stick-3-bold-duotone.svg?color=%237c3aed" 
                     class="w-48 h-48 gacha-ball relative z-10 opacity-80 group-hover:opacity-100" alt="Gacha Ball">
                <div class="mt-8 flex flex-col items-center gap-4">
                    <button id="draw-button" class="shine relative px-10 py-4 bg-gradient-to-r from-purple-700 to-indigo-700 rounded-2xl font-bold text-xl shadow-2xl hover:scale-105 transition-transform gold-glow disabled:opacity-50 disabled:cursor-not-allowed">
                        <span>FALINI ÇEK</span>
                    </button>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-400 hover:text-amber-400 transition">
                        <input type="checkbox" id="luck-boost" class="accent-amber-500 w-4 h-4">
                        Luck Boost (100 GP) - Efsanevi Şansını Artır! %15
                    </label>
                </div>
            </div>
            <p id="limit-msg" class="text-amber-500 text-sm hidden">Bugünlük falını çektin. Yarın tekrar gel!</p>
        </section>

        <!-- Showcase / Gallery Section -->
        <section id="showcase-section" class="mt-20">
            <div class="flex justify-between items-end mb-10 border-b border-white/5 pb-4">
                <div>
                    <h2 class="text-3xl font-bold">Senin Vitrinin</h2>
                    <p id="vitrin-owner" class="text-gray-500">Kendi kehanetlerin.</p>
                </div>
            </div>
            <div id="fortune-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <!-- AI Writing Overlay -->
    <div id="ai-loading-overlay" class="fixed inset-0 z-[200] hidden flex flex-col items-center justify-center p-4 bg-black/95">
        <div class="loader-ring mb-8"></div>
        <div class="text-center">
            <h2 id="ai-loading-status" class="text-2xl font-bold mb-2 text-purple-400 animate-pulse">Yıldızlar hizalanıyor...</h2>
            <p class="text-gray-500 max-w-xs mx-auto">Kaderin yapay zeka ile dokunuyor, bu biraz zaman alabilir.</p>
        </div>
    </div>

    <!-- Social Panel -->
    <div id="social-panel" class="fixed top-0 right-0 h-full w-full max-w-sm glass z-[150] translate-x-full transition-transform duration-500">
        <div class="p-8 h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Sosyal</h2>
                <button id="close-social" class="text-gray-500 hover:text-white">✕</button>
            </div>
            
            <!-- Search -->
            <div class="mb-8">
                <input type="text" id="user-search" placeholder="Kullanıcı ara..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500">
                <div id="search-results" class="mt-2 space-y-2"></div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-4 border-b border-white/10 mb-6 text-sm">
                <button class="pb-2 border-b-2 border-purple-500 text-white">Arkadaşlar</button>
                <button id="pending-tab" class="pb-2 border-b-2 border-transparent text-gray-500 hover:text-white">İstekler <span id="req-count" class="hidden bg-red-500 text-[10px] px-1.5 rounded-full">0</span></button>
            </div>

            <div id="social-list" class="flex-1 overflow-y-auto space-y-4">
                <!-- Friends list here -->
            </div>
        </div>
    </div>

    <!-- Fortune Popup Overlay -->
    <div id="fortune-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm"></div>
        <div class="glass max-w-lg w-full rounded-[2.5rem] relative z-[101] overflow-hidden">
            <div class="relative h-[28rem] overflow-hidden">
                <img id="modal-image" src="" alt="Yapay Zeka Fal Görseli" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent"></div>
                <div id="modal-rarity-badge" class="absolute top-6 left-6 px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase"></div>
                <div class="absolute bottom-0 left-0 p-8">
                    <p id="modal-text" class="text-2xl font-semibold leading-tight text-white"></p>
                </div>
            </div>
            <div class="p-6 flex justify-between items-center bg-gray-900/50">
                <button id="download-btn" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition">Görseli İndir</button>
                <button id="close-modal" class="px-6 py-2 bg-white text-black rounded-full font-bold hover:bg-gray-200 transition">Kapat</button>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80"></div>
        <div class="glass max-w-sm w-full p-8 rounded-3xl relative z-[101]">
            <h2 id="auth-title" class="text-center text-2xl font-bold mb-6">Giriş Yap</h2>
            <div class="space-y-4">
                <input type="text" id="auth-username" placeholder="Kullanıcı Adı" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500">
                <input type="email" id="auth-email" class="hidden w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500" placeholder="E-posta">
                <input type="password" id="auth-password" placeholder="Şifre" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500">
                <button id="auth-submit" class="w-full bg-purple-600 py-3 rounded-xl font-bold hover:bg-purple-700 transition">Devam Et</button>
                <p id="auth-switch" class="text-center text-sm text-gray-500 cursor-pointer hover:text-gray-300">Hesabın yok mu? Kayıt ol.</p>
            </div>
            <button id="close-auth" class="absolute top-4 right-4 text-gray-500 hover:text-white">✕</button>
        </div>
    </div>

    <script src="scripts/api.js"></script>
    <script src="scripts/animations.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
